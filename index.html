<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lewis Block Blast</title>

<!-- PWA Meta -->
<meta name="theme-color" content="#0a0a14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Block Blast">
<meta name="application-name" content="Lewis Block Blast">
<meta name="description" content="Lewis Block Blast – tap to rotate, drag to place!">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icon-144.png">
<link rel="apple-touch-icon" sizes="128x128" href="icon-128.png">

<!-- Manifest -->
<link rel="manifest" href="/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a14;
    --surface: #14142a;
    --surface2: #12122a;
    --accent: #e94560;
    --gold: #ffd700;
    --text: #f0f0f8;
    --grid-line: rgba(255,255,255,0.18);
    --cell-empty: rgba(255,255,255,0.055);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(233,69,96,0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 85%, rgba(99,102,241,0.1) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(6,182,212,0.04) 0%, transparent 60%);
  }

  /* ── TITLE BANNER ── */
  .title-banner {
    width: 100%;
    max-width: 420px;
    text-align: center;
    padding: 14px 20px 2px;
    position: relative;
  }

  .title-lewis {
    font-family: 'Fredoka One', cursive;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 0px;
  }

  .title-main {
    font-family: 'Fredoka One', cursive;
    font-size: 34px;
    line-height: 1;
    background: linear-gradient(135deg, #ffd700 0%, #ff6b35 50%, #e94560 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,100,0,0.4));
    letter-spacing: 1px;
  }

  .top-btns {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }

  .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
  .icon-btn.muted { color: rgba(255,255,255,0.2); }

  /* ── SCORE AREA ── */
  .score-row {
    width: 100%; max-width: 420px;
    display: flex; gap: 8px;
    padding: 6px 16px 4px;
  }

  .score-box {
    flex: 1; background: var(--surface);
    border-radius: 14px; padding: 6px 10px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .score-label { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
  .score-value { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--gold); line-height: 1.2; transition: transform 0.15s; }
  .score-value.bump { transform: scale(1.4); }

  /* ── POWER-UPS BAR ── */
  .powerup-bar { width:100%; max-width:420px; padding:4px 16px 2px; display:flex; gap:8px; align-items:center; }
  .powerup-label { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.3); font-weight:700; margin-right:2px; }

  .pu-btn {
    flex:1; background:var(--surface); border-radius:12px;
    border:1px solid rgba(255,255,255,0.08); padding:7px 4px;
    text-align:center; cursor:pointer; transition:all 0.15s;
    position:relative;
  }

  .pu-btn:hover:not(.disabled) { border-color:rgba(255,255,255,0.25); transform:scale(1.04); }
  .pu-btn:active:not(.disabled) { transform:scale(0.97); }
  .pu-btn.disabled { opacity:0.3; pointer-events:none; }

  .pu-icon { font-size:20px; display:block; }
  .pu-name { font-size:8px; font-weight:700; letter-spacing:0.5px; color:rgba(255,255,255,0.5); margin-top:1px; text-transform:uppercase; }
  .pu-count { position:absolute; top:4px; right:6px; font-family:'Fredoka One',cursive; font-size:11px; color:var(--gold); }

  /* ── GRID ── */
  .grid-wrapper { width:100%; max-width:420px; padding:0 14px; margin:4px 0; }

  #grid-container {
    width:100%; aspect-ratio:1; background:var(--surface);
    border-radius:20px; border:1.5px solid rgba(255,255,255,0.07);
    padding:9px;
    display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
    gap:3px;
    box-shadow:0 8px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .cell { border-radius:5px; background:var(--cell-empty); border:1px solid var(--grid-line); transition:background 0.08s,transform 0.08s; cursor:default; position:relative; overflow:hidden; }
  .cell.filled { border:none; }
  .cell.filled::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.22) 0%,transparent 55%); border-radius:inherit; }

  .cell.bomb-target { cursor:crosshair; animation:bombPulse 0.6s infinite alternate; }
  @keyframes bombPulse { from {box-shadow:0 0 0 0 rgba(233,69,96,0.4);} to {box-shadow:0 0 0 5px rgba(233,69,96,0);} }

  .cell.highlight { transform:scale(0.92); opacity:0.85; box-shadow:0 0 8px rgba(255,255,255,0.3); }
  .cell.highlight-invalid { background:rgba(233,69,96,0.3) !important; transform:scale(0.92); }
  .cell.clearing { animation:cellClear 0.35s forwards; }
  @keyframes cellClear { 0%{transform:scale(1);opacity:1;} 40%{transform:scale(1.2);} 100%{transform:scale(0);opacity:0;} }
  .cell.place-anim { animation:cellPlace 0.2s forwards; }
  @keyframes cellPlace { 0%{transform:scale(1.3);} 100%{transform:scale(1);} }
  .cell.flash { animation:cellFlash 0.3s forwards; }
  @keyframes cellFlash { 0%,100%{filter:brightness(1);} 50%{filter:brightness(2.5);} }

  /* ── STREAK ── */
  .streak-bar { width:100%; max-width:420px; padding:2px 16px 2px; display:flex; gap:5px; justify-content:center; align-items:center; }
  .streak-label { font-size:9px; letter-spacing:1.5px; color:rgba(255,255,255,0.25); font-weight:700; text-transform:uppercase; margin-right:4px; }
  .streak-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.1); transition:background 0.3s,transform 0.3s; }
  .streak-dot.active { background:var(--gold); transform:scale(1.3); box-shadow:0 0 6px var(--gold); }

  /* ── PIECES TRAY ── */
  .pieces-tray { width:100%; max-width:420px; padding:6px 14px 14px; display:flex; justify-content:space-around; align-items:center; gap:8px; }

  .piece-slot {
    flex:1; height:110px; background:var(--surface);
    border-radius:16px; border:1.5px solid rgba(255,255,255,0.07);
    display:flex; align-items:center; justify-content:center;
    cursor:grab; transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;
    position:relative; user-select:none; touch-action:none;
    overflow:hidden;
  }

  .piece-slot:active { cursor:grabbing; }
  .piece-slot.used { opacity:0.18; pointer-events:none; }
  .piece-slot.dragging { transform:scale(1.06); box-shadow:0 8px 30px rgba(0,0,0,0.5); border-color:rgba(255,255,255,0.22); z-index:100; }

  /* ── ROTATE HINT BADGE ── */
  .rotate-hint {
    position: absolute;
    top: 4px; right: 6px;
    font-size: 14px;
    opacity: 0.55;
    pointer-events: none;
    transition: opacity 0.2s;
    line-height: 1;
  }

  .piece-slot:hover .rotate-hint,
  .piece-slot:focus .rotate-hint { opacity: 0.9; }

  /* ── ROTATE ANIMATION ── */
  @keyframes rotatePop {
    0%   { transform: scale(1) rotate(0deg); }
    40%  { transform: scale(1.18) rotate(90deg); }
    70%  { transform: scale(0.95) rotate(90deg); }
    100% { transform: scale(1) rotate(90deg); }
  }

  .piece-grid.rotating { animation: rotatePop 0.28s cubic-bezier(.34,1.56,.64,1) forwards; }

  /* ── DRAG GHOST ── */
  #drag-ghost { position:fixed; pointer-events:none; z-index:9999; display:none; transform:translate(-50%,-50%) scale(1.1); opacity:0.88; }

  /* ── FLOATERS ── */
  .score-popup { position:fixed; font-family:'Fredoka One',cursive; font-size:26px; color:var(--gold); pointer-events:none; z-index:999; animation:floatUp 1s ease-out forwards; text-shadow:0 0 20px rgba(255,215,0,0.8); }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-80px) scale(1.4);} }

  .combo-banner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Fredoka One',cursive; font-size:50px; color:white; text-shadow:0 0 30px rgba(255,215,0,1),0 4px 0 rgba(0,0,0,0.5); pointer-events:none; z-index:1000; animation:comboBurst 0.8s ease-out forwards; white-space:nowrap; }
  @keyframes comboBurst { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);} 30%{opacity:1;transform:translate(-50%,-50%) scale(1.15);} 70%{opacity:1;transform:translate(-50%,-50%) scale(1);} 100%{opacity:0;transform:translate(-50%,-50%) scale(0.8);} }

  /* ── OVERLAYS ── */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.78); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:2000; opacity:0; pointer-events:none; transition:opacity 0.35s; }
  .overlay.show { opacity:1; pointer-events:all; }

  .overlay-card { background:var(--surface2); border-radius:28px; padding:32px 36px; text-align:center; border:1.5px solid rgba(255,255,255,0.1); box-shadow:0 24px 64px rgba(0,0,0,0.7); transform:scale(0.82); transition:transform 0.4s cubic-bezier(.34,1.56,.64,1); max-width:340px; width:90%; }
  .overlay.show .overlay-card { transform:scale(1); }

  .overlay-title { font-family:'Fredoka One',cursive; font-size:40px; background:linear-gradient(135deg,#ffd700,#ff6b35); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
  .overlay-score-label { font-size:11px; color:rgba(255,255,255,0.35); font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; }
  .overlay-score-val { font-family:'Fredoka One',cursive; font-size:52px; color:var(--gold); margin-bottom:4px; }
  .overlay-sub { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:20px; }

  .btn-primary { background:linear-gradient(135deg,#e94560,#c0392b); color:white; border:none; font-family:'Fredoka One',cursive; font-size:20px; padding:13px 36px; border-radius:50px; cursor:pointer; box-shadow:0 4px 20px rgba(233,69,96,0.5); transition:transform 0.15s,box-shadow 0.15s; letter-spacing:1px; margin:4px; }
  .btn-primary:hover { transform:scale(1.05); box-shadow:0 6px 28px rgba(233,69,96,0.7); }
  .btn-primary:active { transform:scale(0.97); }

  .btn-secondary { background:var(--surface); color:rgba(255,255,255,0.7); border:1.5px solid rgba(255,255,255,0.12); font-family:'Fredoka One',cursive; font-size:16px; padding:10px 28px; border-radius:50px; cursor:pointer; transition:all 0.15s; margin:4px; }
  .btn-secondary:hover { border-color:rgba(255,255,255,0.3); color:white; }

  /* ── LEADERBOARD ── */
  .lb-list { list-style:none; margin:12px 0 20px; text-align:left; }
  .lb-list li { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:12px; margin-bottom:5px; background:rgba(255,255,255,0.04); font-size:14px; }
  .lb-list li:first-child { background:rgba(255,215,0,0.1); }
  .lb-rank { font-family:'Fredoka One',cursive; font-size:16px; color:rgba(255,255,255,0.3); width:22px; }
  .lb-list li:first-child .lb-rank { color:var(--gold); }
  .lb-name { flex:1; font-weight:700; color:rgba(255,255,255,0.8); }
  .lb-pts { font-family:'Fredoka One',cursive; font-size:18px; color:var(--gold); }

  /* particles canvas */
  #particles { position:fixed; inset:0; pointer-events:none; z-index:500; }

  /* COLORS */
  .c-red    { background:#e94560; }
  .c-blue   { background:#3b82f6; }
  .c-green  { background:#22c55e; }
  .c-yellow { background:#fbbf24; }
  .c-purple { background:#a855f7; }
  .c-cyan   { background:#06b6d4; }
  .c-orange { background:#f97316; }
  .c-pink   { background:#ec4899; }

  /* ── INSTALL BANNER ── */
  #install-banner {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 10px 18px;
    z-index: 3000;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    max-width: 360px;
    width: calc(100% - 32px);
    animation: slideUp 0.4s cubic-bezier(.34,1.56,.64,1);
  }

  #install-banner.visible { display: flex; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  #install-banner .ib-icon { font-size: 28px; flex-shrink: 0; }
  #install-banner .ib-text { flex: 1; }
  #install-banner .ib-title { font-family: 'Fredoka One', cursive; font-size: 15px; color: var(--gold); }
  #install-banner .ib-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }

  #install-banner .ib-btn {
    background: linear-gradient(135deg, #e94560, #c0392b);
    color: white;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    padding: 7px 14px;
    border-radius: 30px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #install-banner .ib-close {
    background: none; border: none;
    color: rgba(255,255,255,0.3);
    font-size: 18px; cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- TITLE -->
<div class="title-banner">
  <div class="title-lewis">Lewis</div>
  <div class="title-main">Block Blast! 💥</div>
  <div class="top-btns">
    <div class="icon-btn" id="sound-btn" title="Toggle Sound" onclick="toggleSound()">🔊</div>
    <div class="icon-btn" title="Leaderboard" onclick="showLeaderboard()">🏆</div>
  </div>
</div>

<!-- SCORES -->
<div class="score-row">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="score-display">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-value" id="best-display">0</div>
  </div>
</div>

<!-- POWER-UPS -->
<div class="powerup-bar">
  <div class="powerup-label">Power</div>
  <div class="pu-btn" id="pu-bomb" onclick="activatePowerup('bomb')" title="Bomb: removes a 3x3 area">
    <span class="pu-icon">💣</span>
    <span class="pu-name">Bomb</span>
    <span class="pu-count" id="pu-bomb-count">3</span>
  </div>
  <div class="pu-btn" id="pu-row" onclick="activatePowerup('row')" title="Clear Row">
    <span class="pu-icon">↔️</span>
    <span class="pu-name">Row</span>
    <span class="pu-count" id="pu-row-count">2</span>
  </div>
  <div class="pu-btn" id="pu-shuffle" onclick="activatePowerup('shuffle')" title="Shuffle pieces">
    <span class="pu-icon">🔀</span>
    <span class="pu-name">Shuffle</span>
    <span class="pu-count" id="pu-shuffle-count">2</span>
  </div>
  <div class="pu-btn" id="pu-undo" onclick="activatePowerup('undo')" title="Undo last move">
    <span class="pu-icon">↩️</span>
    <span class="pu-name">Undo</span>
    <span class="pu-count" id="pu-undo-count">1</span>
  </div>
</div>

<!-- STREAK -->
<div class="streak-bar">
  <span class="streak-label">Streak</span>
  <div class="streak-dot"></div>
  <div class="streak-dot"></div>
  <div class="streak-dot"></div>
  <div class="streak-dot"></div>
  <div class="streak-dot"></div>
</div>

<!-- GRID -->
<div class="grid-wrapper">
  <div id="grid-container"></div>
</div>

<!-- PIECE TRAY — tap to rotate, drag to place -->
<div class="pieces-tray" id="pieces-tray">
  <div class="piece-slot" id="slot-0"></div>
  <div class="piece-slot" id="slot-1"></div>
  <div class="piece-slot" id="slot-2"></div>
</div>

<canvas id="particles"></canvas>
<div id="drag-ghost"></div>

<!-- GAME OVER OVERLAY -->
<div class="overlay" id="gameover-overlay">
  <div class="overlay-card">
    <div class="overlay-title">Game Over!</div>
    <div id="new-best-badge" style="display:none;margin-bottom:6px;">
      <span style="background:linear-gradient(135deg,#ffd700,#ff6b35);color:#000;font-family:'Fredoka One',cursive;padding:3px 12px;border-radius:20px;font-size:13px;">🎉 NEW BEST!</span>
    </div>
    <div class="overlay-score-label">Your Score</div>
    <div class="overlay-score-val" id="final-score">0</div>
    <div class="overlay-sub" id="final-best">Best: 0</div>
    <br>
    <button class="btn-primary" onclick="startGame()">▶ Play Again</button>
    <button class="btn-secondary" onclick="showLeaderboard()">🏆 Scores</button>
  </div>
</div>

<!-- LEADERBOARD OVERLAY -->
<div class="overlay" id="lb-overlay">
  <div class="overlay-card">
    <div class="overlay-title" style="font-size:32px">🏆 Top Scores</div>
    <ul class="lb-list" id="lb-list"></ul>
    <button class="btn-secondary" onclick="hideLb()">Close</button>
  </div>
</div>

<!-- POWERUP ACTIVE OVERLAY (row picker) -->
<div class="overlay" id="pu-overlay">
  <div class="overlay-card">
    <div class="overlay-title" style="font-size:28px" id="pu-overlay-title">Pick a Row</div>
    <p style="color:rgba(255,255,255,0.5);font-size:13px;margin:10px 0 16px" id="pu-overlay-sub">Tap any row number to clear it</p>
    <div id="pu-overlay-options" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px;"></div>
    <button class="btn-secondary" onclick="cancelPowerup()">Cancel</button>
  </div>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <span class="ib-icon">🎮</span>
  <div class="ib-text">
    <div class="ib-title">Install Block Blast!</div>
    <div class="ib-sub">Play offline anytime</div>
  </div>
  <button class="ib-btn" id="install-btn">Install</button>
  <button class="ib-close" onclick="dismissInstall()">✕</button>
</div>

<script>
// ════════════════════════════════════════════
//  SERVICE WORKER REGISTRATION
// ════════════════════════════════════════════
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(err => {
      console.warn('SW registration failed:', err);
    });
  });
}

// ════════════════════════════════════════════
//  PWA INSTALL PROMPT
// ════════════════════════════════════════════
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (!localStorage.getItem('installDismissed')) {
    setTimeout(() => banner.classList.add('visible'), 2000);
  }
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  dismissInstall();
  if (outcome === 'accepted') showFloater('🎉 App installed!');
});

window.addEventListener('appinstalled', () => {
  dismissInstall();
  deferredPrompt = null;
});

function dismissInstall() {
  document.getElementById('install-banner').classList.remove('visible');
  localStorage.setItem('installDismissed', '1');
}

// ════════════════════════════════════════════
//  GAME CONSTANTS & HELPERS
// ════════════════════════════════════════════
const GRID = 8;
const COLORS = ['red','blue','green','yellow','purple','cyan','orange','pink'];
const COLOR_MAP = { red:'#e94560', blue:'#3b82f6', green:'#22c55e', yellow:'#fbbf24', purple:'#a855f7', cyan:'#06b6d4', orange:'#f97316', pink:'#ec4899' };

// Base piece definitions (canonical shapes)
const PIECES = [
  {shape:[[1]],w:1,h:1},
  {shape:[[1,1]],w:2,h:1},
  {shape:[[1],[1]],w:1,h:2},
  {shape:[[1,1,1]],w:3,h:1},
  {shape:[[1],[1],[1]],w:1,h:3},
  {shape:[[1,1,1,1]],w:4,h:1},
  {shape:[[1],[1],[1],[1]],w:1,h:4},
  {shape:[[1,1,1,1,1]],w:5,h:1},
  {shape:[[1],[1],[1],[1],[1]],w:1,h:5},
  {shape:[[1,1],[1,1]],w:2,h:2},
  {shape:[[1,1,1],[1,1,1],[1,1,1]],w:3,h:3},
  {shape:[[1,0],[1,0],[1,1]],w:2,h:3},
  {shape:[[1,1,1],[1,0,0]],w:3,h:2},
  {shape:[[1,1],[0,1],[0,1]],w:2,h:3},
  {shape:[[0,0,1],[1,1,1]],w:3,h:2},
  {shape:[[0,1],[0,1],[1,1]],w:2,h:3},
  {shape:[[1,0,0],[1,1,1]],w:3,h:2},
  {shape:[[1,1],[1,0],[1,0]],w:2,h:3},
  {shape:[[1,1,1],[0,0,1]],w:3,h:2},
  {shape:[[1,1,1],[0,1,0]],w:3,h:2},
  {shape:[[1,0],[1,1],[1,0]],w:2,h:3},
  {shape:[[0,1,0],[1,1,1]],w:3,h:2},
  {shape:[[0,1],[1,1],[0,1]],w:2,h:3},
  {shape:[[0,1,1],[1,1,0]],w:3,h:2},
  {shape:[[1,0],[1,1],[0,1]],w:2,h:3},
  {shape:[[1,1,0],[0,1,1]],w:3,h:2},
  {shape:[[0,1],[1,1],[1,0]],w:2,h:3},
  {shape:[[1,1],[1,0]],w:2,h:2},
  {shape:[[1,1],[0,1]],w:2,h:2},
  {shape:[[1,0],[1,1]],w:2,h:2},
  {shape:[[0,1],[1,1]],w:2,h:2},
];

// ─── Rotate a shape 90° clockwise ───────────────────────────────────────────
// Input: 2D array (rows×cols). Output: new 2D array (cols×rows).
function rotateShape90(shape) {
  const rows = shape.length;
  const cols = shape[0].length;
  const rotated = [];
  for (let c = 0; c < cols; c++) {
    const newRow = [];
    for (let r = rows - 1; r >= 0; r--) {
      newRow.push(shape[r][c]);
    }
    rotated.push(newRow);
  }
  return rotated;
}

//  AUDIO

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playTone(freq, type='sine', duration=0.08, vol=0.12) {
  if (!soundOn) return;
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*0.8, audioCtx.currentTime+duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+duration);
    osc.start();
    osc.stop(audioCtx.currentTime+duration);
  } catch(e){}
}

function playPlace()   { playTone(440,'square',0.06,0.1); }
function playRotate()  { playTone(660,'sine',0.05,0.08); }
function playClear()   { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.12,0.15),i*60)); }
function playCombo()   { playTone(880,'sawtooth',0.15,0.2); }
function playGameOver(){ playTone(200,'sawtooth',0.4,0.2); }
function playPowerup() { playTone(600,'sine',0.18,0.18); }

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particlesArr = [];

function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnParticles(cells) {
  cells.forEach(({r,c,color}) => {
    const cell=getCellEl(r,c);
    if (!cell) return;
    const rect=cell.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const col=COLOR_MAP[color]||'#fff';
    for (let i=0;i<7;i++) {
      particlesArr.push({x:cx,y:cy,vx:(Math.random()-0.5)*7,vy:(Math.random()-2.2)*5,r:Math.random()*4+2,color:col,alpha:1});
    }
  });
}

function animParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArr = particlesArr.filter(p=>p.alpha>0);
  particlesArr.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.alpha-=0.028;
    ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
  requestAnimationFrame(animParticles);
}
requestAnimationFrame(animParticles);

// ════════════════════════════════════════════
//  GRID
// ════════════════════════════════════════════
function getCellEl(r,c) { return document.getElementById(`cell-${r}-${c}`); }

function buildGrid() {
  grid = Array.from({length:GRID},()=>Array(GRID).fill(null));
  const container = document.getElementById('grid-container');
  container.innerHTML = '';
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `cell-${r}-${c}`;
    container.appendChild(cell);
  }
}

function renderGrid() {
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    const cell=getCellEl(r,c);
    const val=grid[r][c];
    cell.className='cell'+(val?` filled c-${val}`:'');
    cell.onclick=null;
  }
}

function canPlace(shape,row,col) {
  for (let r=0;r<shape.length;r++) for (let c=0;c<shape[r].length;c++) {
    if (!shape[r][c]) continue;
    const gr=row+r,gc=col+c;
    if (gr<0||gr>=GRID||gc<0||gc>=GRID) return false;
    if (grid[gr][gc]) return false;
  }
  return true;
}

function placePiece(shape,color,row,col) {
  const cells=[];
  for (let r=0;r<shape.length;r++) for (let c=0;c<shape[r].length;c++) {
    if (!shape[r][c]) continue;
    grid[row+r][col+c]=color;
    cells.push({r:row+r,c:col+c});
  }
  cells.forEach(({r,c}) => { getCellEl(r,c).className=`cell filled c-${color} place-anim`; });
  return cells;
}

function clearLines() {
  const rows=[],cols=[];
  for (let r=0;r<GRID;r++) if (grid[r].every(v=>v)) rows.push(r);
  for (let c=0;c<GRID;c++) if (grid.every(row=>row[c])) cols.push(c);
  if (!rows.length && !cols.length) return 0;

  const clearing=new Set(), colorList=[];
  rows.forEach(r=>{ for(let c=0;c<GRID;c++){const k=`${r},${c}`;if(!clearing.has(k)){clearing.add(k);colorList.push({r,c,color:grid[r][c]});}} });
  cols.forEach(c=>{ for(let r=0;r<GRID;r++){const k=`${r},${c}`;if(!clearing.has(k)){clearing.add(k);colorList.push({r,c,color:grid[r][c]});}} });

  colorList.forEach(({r,c})=>getCellEl(r,c).classList.add('flash'));
  setTimeout(()=>{
    colorList.forEach(({r,c})=>getCellEl(r,c).classList.add('clearing'));
    spawnParticles(colorList);
    playClear();
    setTimeout(()=>{ colorList.forEach(({r,c})=>{grid[r][c]=null;}); renderGrid(); },350);
  },100);

  return rows.length+cols.length;
}

function calcScore(linesCleared, pieceSize) {
  const base = pieceSize*2;
  const lineBonus = linesCleared>0 ? linesCleared*linesCleared*80 : 0;
  const comboBonus = linesCleared>1 ? linesCleared*50 : 0;
  const streakBonus = streak*10;
  return base+lineBonus+comboBonus+streakBonus;
}

function addScore(pts, x, y) {
  score += pts;
  if (score>best) { best=score; localStorage.setItem('lb_best',best); }
  const sv = document.getElementById('score-display');
  sv.textContent = score;
  sv.classList.remove('bump'); void sv.offsetWidth; sv.classList.add('bump');
  setTimeout(()=>sv.classList.remove('bump'),200);
  document.getElementById('best-display').textContent = best;

  const popup=document.createElement('div');
  popup.className='score-popup';
  popup.textContent=`+${pts}`;
  popup.style.left=x+'px'; popup.style.top=y+'px';
  document.body.appendChild(popup);
  setTimeout(()=>popup.remove(),1000);
}

// ════════════════════════════════════════════
//  POWER-UPS
// ════════════════════════════════════════════
function updatePUButtons() {
  ['bomb','row','shuffle','undo'].forEach(k=>{
    document.getElementById(`pu-${k}-count`).textContent=powerups[k];
    document.getElementById(`pu-${k}`).classList.toggle('disabled',powerups[k]<=0);
  });
}

function activatePowerup(type) {
  if (powerups[type]<=0) return;
  ensureAudio();
  playPowerup();

  if (type==='bomb') {
    activePU='bomb';
    showFloater('💣 Tap any filled cell to bomb it!');
    for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
      if (grid[r][c]) {
        const el=getCellEl(r,c);
        el.classList.add('bomb-target');
        el.onclick=()=>doBomb(r,c);
      }
    }
  } else if (type==='row') {
    activePU='row';
    const opts=document.getElementById('pu-overlay-options');
    opts.innerHTML='';
    for (let r=0;r<GRID;r++) {
      const btn=document.createElement('button');
      btn.className='btn-secondary';
      btn.style.cssText='padding:8px 14px;font-size:14px;margin:2px;';
      btn.textContent=`Row ${r+1}`;
      btn.onclick=()=>doRowClear(r);
      opts.appendChild(btn);
    }
    document.getElementById('pu-overlay-title').textContent='↔ Clear a Row';
    document.getElementById('pu-overlay-sub').textContent='Choose which row to blast!';
    document.getElementById('pu-overlay').classList.add('show');
  } else if (type==='shuffle') {
    powerups.shuffle--;
    updatePUButtons();
    dealPieces();
    showFloater('🔀 Pieces reshuffled!');
    activePU=null;
  } else if (type==='undo') {
    if (!undoState) { showFloater('⚠️ Nothing to undo!'); return; }
    powerups.undo--;
    updatePUButtons();
    grid=undoState.grid.map(r=>[...r]);
    score=undoState.score;
    pieces=undoState.pieces.map(p=>({...p,shape:p.shape.map(r=>[...r])}));
    usedSlots=[...undoState.usedSlots];
    renderGrid();
    renderTray();
    document.getElementById('score-display').textContent=score;
    undoState=null;
    showFloater('↩️ Move undone!');
    activePU=null;
  }
}

function doBomb(row,col) {
  if (activePU!=='bomb') return;
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) { const el=getCellEl(r,c); el.classList.remove('bomb-target'); el.onclick=null; }
  powerups.bomb--; updatePUButtons(); activePU=null;
  const cells=[];
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    const r=row+dr,c=col+dc;
    if (r>=0&&r<GRID&&c>=0&&c<GRID&&grid[r][c]) { cells.push({r,c,color:grid[r][c]}); grid[r][c]=null; }
  }
  cells.forEach(({r,c})=>getCellEl(r,c).classList.add('clearing'));
  spawnParticles(cells); playClear();
  setTimeout(renderGrid,380);
  const pts=cells.length*5;
  addScore(pts,window.innerWidth/2,window.innerHeight/2);
  showFloater(`💣 BOOM! +${pts}`);
}

function doRowClear(row) {
  document.getElementById('pu-overlay').classList.remove('show');
  powerups.row--; updatePUButtons(); activePU=null;
  const cells=[];
  for (let c=0;c<GRID;c++) { if(grid[row][c]) cells.push({r:row,c,color:grid[row][c]}); grid[row][c]=null; }
  cells.forEach(({r,c})=>getCellEl(r,c).classList.add('clearing'));
  spawnParticles(cells); playClear();
  setTimeout(renderGrid,380);
  const pts=cells.length*5;
  addScore(pts,window.innerWidth/2,window.innerHeight/2);
  showFloater(`↔️ Row ${row+1} cleared! +${pts}`);
}

function cancelPowerup() {
  document.getElementById('pu-overlay').classList.remove('show');
  if (activePU==='bomb') { for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){const el=getCellEl(r,c);el.classList.remove('bomb-target');el.onclick=null;} }
  activePU=null;
}

function showFloater(msg) {
  const el=document.createElement('div');
  el.className='score-popup';
  el.style.cssText='font-size:16px;left:50%;top:40%;transform:translateX(-50%);white-space:nowrap;color:white;';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

// ════════════════════════════════════════════
//  PIECES + TAP-TO-ROTATE
// ════════════════════════════════════════════
function randomPiece() {
  const p = PIECES[Math.floor(Math.random()*PIECES.length)];
  const color = COLORS[Math.floor(Math.random()*COLORS.length)];
  return { color, shape: p.shape.map(row=>[...row]) };
}

/** Derive w/h from current shape */
function pieceWH(p) {
  return { w: p.shape[0].length, h: p.shape.length };
}

function dealPieces() {
  pieces = [randomPiece(), randomPiece(), randomPiece()];
  usedSlots = [false,false,false];
  renderTray();
}

function renderTray() { for(let i=0;i<3;i++) renderSlot(i); }

function renderSlot(i) {
  const slot = document.getElementById(`slot-${i}`);
  slot.innerHTML = '';
  slot.className = 'piece-slot' + (usedSlots[i] ? ' used' : '');
  if (usedSlots[i]) return;

  const p = pieces[i];
  const {w, h} = pieceWH(p);

  // Measure the slot AFTER layout — use offsetWidth, fallback 110
  const slotSize = slot.offsetWidth || 110;
  const PADDING = 16; // px padding inside slot on each axis
  const available = slotSize - PADDING * 2;

  // Cell size = fit the entire bounding box (w cols × h rows) inside available space
  // Keep cells square, so use the most constraining dimension
  const cellSize = Math.max(8, Math.floor(available / Math.max(w, h)));

  // Wrapper: centres the piece-grid inside the slot
  const wrapper = document.createElement('div');
  wrapper.style.cssText = `
    display:flex; align-items:center; justify-content:center;
    width:100%; height:100%; position:relative;
  `;

  const pg = document.createElement('div');
  pg.className = 'piece-grid';
  pg.id = `piece-grid-${i}`;
  pg.style.cssText = `
    display:grid;
    grid-template-columns: repeat(${w}, ${cellSize}px);
    grid-template-rows:    repeat(${h}, ${cellSize}px);
    gap: 2px;
  `;

  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const pc = document.createElement('div');
      const filled = p.shape[r][c];
      pc.style.cssText = `
        width:${cellSize}px; height:${cellSize}px;
        border-radius:${Math.max(2, Math.round(cellSize * 0.18))}px;
        position:relative; overflow:hidden;
        background:${filled ? COLOR_MAP[p.color] : 'transparent'};
      `;
      if (filled) {
        // shine highlight
        const shine = document.createElement('div');
        shine.style.cssText = `
          position:absolute; inset:0;
          background:linear-gradient(135deg,rgba(255,255,255,0.28) 0%,transparent 55%);
          border-radius:inherit;
        `;
        pc.appendChild(shine);
      }
      pg.appendChild(pc);
    }
  }

  // Rotate hint — top-right corner of the slot, not inside the piece grid
  const hint = document.createElement('span');
  hint.className = 'rotate-hint';
  hint.textContent = '🔄';
  hint.title = 'Tap to rotate';

  wrapper.appendChild(pg);
  slot.appendChild(hint);
  slot.appendChild(wrapper);

  setupSlotInteraction(slot, i);
}

// ── TAP-TO-ROTATE vs DRAG detection ─────────────────────────────────────────
function setupSlotInteraction(slot, idx) {
  // Replace with a clean clone so old stacked listeners are wiped
  const fresh = slot.cloneNode(true);
  slot.parentNode.replaceChild(fresh, slot);
  slot = fresh;
  // Keep the global slot-N id accessible
  slot.id = `slot-${idx}`;

  let pressStart = null;
  let pressMoved = false;
  const MOVE_THRESHOLD = 8;

  // ─ Touch ─
  slot.addEventListener('touchstart', e => {
    if (usedSlots[idx] || activePU) return;
    const t = e.touches[0];
    pressStart = { x: t.clientX, y: t.clientY, time: Date.now() };
    pressMoved = false;
    _prepareDrag(e, idx, true);
  }, { passive: false });

  slot.addEventListener('touchmove', e => {
    if (!pressStart) return;
    const t = e.touches[0];
    const dx = Math.abs(t.clientX - pressStart.x);
    const dy = Math.abs(t.clientY - pressStart.y);
    if (dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD) pressMoved = true;
    onDragMove(e);
  }, { passive: false });

  slot.addEventListener('touchend', e => {
    if (!pressStart) return;
    const dt = Date.now() - pressStart.time;
    if (!pressMoved && dt < 350) {
      _cancelDrag();
      rotatePiece(idx);
    } else {
      onDragEnd(e);
    }
    pressStart = null;
  });

  // ─ Mouse ─
  slot.addEventListener('mousedown', e => {
    if (usedSlots[idx] || activePU) return;
    pressStart = { x: e.clientX, y: e.clientY, time: Date.now() };
    pressMoved = false;
    _prepareDrag(e, idx, false);
  });
}

// ── Rotate a piece 90° clockwise ─────────────────────────────────────────────
function rotatePiece(idx) {
  if (usedSlots[idx]) return;
  ensureAudio();
  playRotate();

  // Update the shape in state
  pieces[idx] = { ...pieces[idx], shape: rotateShape90(pieces[idx].shape) };

  // Re-render slot fresh (new DOM, no stale references)
  renderSlot(idx);

  // Flash the slot with a quick scale pop via inline style
  const slot = document.getElementById(`slot-${idx}`);
  slot.style.transform = 'scale(1.12)';
  slot.style.borderColor = 'rgba(255,215,0,0.5)';
  setTimeout(() => {
    slot.style.transform = '';
    slot.style.borderColor = '';
  }, 180);
}

// ════════════════════════════════════════════
//  DRAG SYSTEM
// ════════════════════════════════════════════
function _prepareDrag(e, idx, isTouch) {
  if (usedSlots[idx] || activePU) return;
  if (isTouch) e.preventDefault();
  ensureAudio();
  const pos = _getPos(e, isTouch);
  const p = pieces[idx];
  const {w,h} = pieceWH(p);

  const ghost = document.getElementById('drag-ghost');
  ghost.innerHTML = '';
  const cellSize = 30;
  const pg2 = document.createElement('div');
  pg2.style.cssText = `display:grid;grid-template-columns:repeat(${w},${cellSize}px);grid-template-rows:repeat(${h},${cellSize}px);gap:2px;`;
  for (let r=0;r<h;r++) for (let c=0;c<w;c++) {
    const filled = p.shape[r][c];
    const pc=document.createElement('div');
    pc.style.cssText=`width:${cellSize}px;height:${cellSize}px;border-radius:6px;position:relative;overflow:hidden;background:${filled?COLOR_MAP[p.color]:'transparent'};`;
    if (filled) {
      const shine=document.createElement('div');
      shine.style.cssText='position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.28) 0%,transparent 55%);border-radius:inherit;';
      pc.appendChild(shine);
    }
    pg2.appendChild(pc);
  }
  ghost.appendChild(pg2);
  ghost.style.display='block';
  ghost.style.left=pos.x+'px'; ghost.style.top=pos.y+'px';

  dragState = { idx, piece:p, isTouch, hoverR:undefined, hoverC:undefined };
  document.getElementById(`slot-${idx}`).classList.add('dragging');

  if (isTouch) {
    document.addEventListener('touchmove', onDragMove, {passive:false});
    document.addEventListener('touchend', onDragEnd);
  } else {
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
  }
}

function _cancelDrag() {
  if (!dragState) return;
  document.getElementById('drag-ghost').style.display='none';
  clearHighlights();
  document.getElementById(`slot-${dragState.idx}`).classList.remove('dragging');
  const isTouch = dragState.isTouch;
  dragState = null;
  if (isTouch) {
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend', onDragEnd);
  } else {
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
  }
}

function _getPos(e, isTouch) {
  if (isTouch) { const t=e.touches[0]||e.changedTouches[0]; return {x:t.clientX,y:t.clientY}; }
  return {x:e.clientX,y:e.clientY};
}

function onDragMove(e) {
  if (!dragState) return;
  if (dragState.isTouch) e.preventDefault();
  const pos = _getPos(e, dragState.isTouch);
  const ghost = document.getElementById('drag-ghost');
  ghost.style.left=pos.x+'px'; ghost.style.top=(pos.y-50)+'px';

  clearHighlights();
  const gc2 = document.getElementById('grid-container');
  const gRect = gc2.getBoundingClientRect();
  const cellW = gRect.width/GRID, cellH = gRect.height/GRID;
  const p = dragState.piece;
  const {w,h} = pieceWH(p);
  const baseC = Math.round((pos.x-gRect.left)/cellW - w/2);
  const baseR = Math.round((pos.y-50-gRect.top)/cellH - h/2);
  const valid = canPlace(p.shape,baseR,baseC);

  for (let r=0;r<h;r++) for (let c=0;c<w;c++) {
    if (!p.shape[r][c]) continue;
    const gr=baseR+r, gc3=baseC+c;
    if (gr>=0&&gr<GRID&&gc3>=0&&gc3<GRID) {
      const el=getCellEl(gr,gc3);
      el.classList.add(valid?'highlight':'highlight-invalid');
      if (valid) el.style.background=COLOR_MAP[p.color];
    }
  }
  dragState.hoverR=baseR; dragState.hoverC=baseC;
}

function clearHighlights() {
  document.querySelectorAll('.cell.highlight,.cell.highlight-invalid').forEach(el=>{
    el.classList.remove('highlight','highlight-invalid');
    el.style.background='';
  });
}

function onDragEnd(e) {
  if (!dragState) return;
  document.getElementById('drag-ghost').style.display='none';
  clearHighlights();

  const p=dragState.piece, idx=dragState.idx;
  const r=dragState.hoverR, c=dragState.hoverC;
  document.getElementById(`slot-${idx}`).classList.remove('dragging');

  if (r!==undefined && canPlace(p.shape,r,c)) {
    undoState = {
      grid:grid.map(row=>[...row]),
      score,
      pieces:pieces.map(p=>({...p,shape:p.shape.map(r=>[...r])})),
      usedSlots:[...usedSlots]
    };

    const placed = placePiece(p.shape,p.color,r,c);
    usedSlots[idx]=true;
    renderSlot(idx);
    playPlace();

    const lines=clearLines();
    const pts=calcScore(lines,placed.length);

    const avgR=placed.reduce((s,x)=>s+x.r,0)/placed.length;
    const avgC=placed.reduce((s,x)=>s+x.c,0)/placed.length;
    const refCell=getCellEl(Math.round(avgR),Math.round(avgC));
    const rect=refCell.getBoundingClientRect();
    addScore(pts,rect.left,rect.top);

    if (lines>0) { streak=Math.min(streak+lines,5); updateStreak(); if(lines>=2){showCombo(lines);playCombo();} }
    else { streak=Math.max(0,streak-1); updateStreak(); }

    if (usedSlots.every(v=>v)) setTimeout(dealPieces,400);
    setTimeout(checkGameOver,500);
  }

  const isTouch=dragState.isTouch;
  dragState=null;
  if (isTouch) { document.removeEventListener('touchmove',onDragMove); document.removeEventListener('touchend',onDragEnd); }
  else          { document.removeEventListener('mousemove',onDragMove); document.removeEventListener('mouseup',onDragEnd); }
}

// ════════════════════════════════════════════
//  STREAK / COMBO / GAME OVER
// ════════════════════════════════════════════
function updateStreak() {
  document.querySelectorAll('.streak-dot').forEach((d,i)=>d.classList.toggle('active',i<streak));
}

function showCombo(lines) {
  const labels=['','','Double!','Triple!','Quad!!','PENTA!!!'];
  const label=lines<=5?labels[lines]:`${lines}x COMBO!`;
  const el=document.createElement('div');
  el.className='combo-banner'; el.textContent=label;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

function checkGameOver() {
  if (usedSlots.every(v=>v)) return;
  for (let i=0;i<3;i++) {
    if (usedSlots[i]) continue;
    const p=pieces[i];
    const {w,h}=pieceWH(p);
    for (let r=0;r<=GRID-h;r++) for (let c=0;c<=GRID-w;c++) {
      if (canPlace(p.shape,r,c)) return;
    }
  }
  setTimeout(showGameOver,600);
}

function showGameOver() {
  playGameOver();
  saveToLeaderboard(score);
  document.getElementById('final-score').textContent=score;
  document.getElementById('final-best').textContent=`Best: ${best}`;
  const isNewBest = score>=best && score>0;
  document.getElementById('new-best-badge').style.display=isNewBest?'block':'none';
  document.getElementById('gameover-overlay').classList.add('show');
}

// ════════════════════════════════════════════
//  GAME START
// ════════════════════════════════════════════
function startGame() {
  document.getElementById('gameover-overlay').classList.remove('show');
  score=0; streak=0; activePU=null; undoState=null;
  powerups={bomb:3,row:2,shuffle:2,undo:1};
  updatePUButtons();
  document.getElementById('score-display').textContent='0';
  best=parseInt(localStorage.getItem('lb_best')||'0');
  document.getElementById('best-display').textContent=best;
  updateStreak();
  buildGrid();
  renderGrid();
  dealPieces();
}

// ── INIT ──
best = parseInt(localStorage.getItem('lb_best')||'0');
document.getElementById('best-display').textContent = best;
startGame();
</script>
